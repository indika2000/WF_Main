version: "v2"
namespace: "WILDERNESS_FRIENDS"

# =============================================================================
# RARITY SYSTEM
# =============================================================================

# Rarity weights — byte[0] % 100 maps to these ranges
rarity_weights:
  COMMON:    { min: 0, max: 69 }
  UNCOMMON:  { min: 70, max: 89 }
  RARE:      { min: 90, max: 96 }
  EPIC:      { min: 97, max: 98 }
  LEGENDARY: { min: 99, max: 99 }

# Per-season supply caps (null = unlimited)
supply_caps:
  COMMON:    null
  UNCOMMON:  100000
  RARE:      25000
  EPIC:      5000
  LEGENDARY: 500

# Collision policy per rarity
collision_policy:
  COMMON:    ALLOW
  UNCOMMON:  ALLOW
  RARE:      ALLOW_IF_STATS_DIFFER
  EPIC:      REROLL_ON_SIGNATURE_MATCH
  LEGENDARY: REROLL_ON_ANY_ARCHETYPE_MATCH

max_reroll_attempts: 10

# Stat ranges per rarity — byte[14-20] used for stats
stat_ranges:
  COMMON:    { min: 10, max: 40 }
  UNCOMMON:  { min: 25, max: 55 }
  RARE:      { min: 40, max: 70 }
  EPIC:      { min: 55, max: 85 }
  LEGENDARY: { min: 70, max: 100 }

stat_names:
  - power
  - defense
  - agility
  - wisdom
  - ferocity
  - magic
  - luck

# =============================================================================
# BIOMES (~45)
# =============================================================================

biomes:
  - FOREST
  - DEEP_FOREST
  - ENCHANTED_FOREST
  - ANCIENT_FOREST
  - BAMBOO_FOREST
  - SWAMP
  - MANGROVE_SWAMP
  - BOG
  - MOUNTAIN
  - HIGH_PEAK
  - VOLCANIC_MOUNTAIN
  - SNOWLAND
  - GLACIER
  - FROZEN_TUNDRA
  - ICE_CAVE
  - DESERT
  - SAND_DUNE
  - OASIS
  - BADLANDS
  - OCEAN
  - DEEP_OCEAN
  - CORAL_REEF
  - RIVER
  - LAKE
  - WATERFALL
  - CAVE
  - CRYSTAL_CAVE
  - UNDERGROUND
  - GRASSLAND
  - SAVANNA
  - STEPPE
  - JUNGLE
  - RAINFOREST
  - CANOPY
  - VOLCANO
  - LAVA_FIELD
  - ISLAND
  - COAST
  - CLIFF
  - RUINS
  - CEMETERY
  - VOID
  - SKY_REALM
  - CLOUD_PEAKS
  - MUSHROOM_GROVE

# Season 2: Ocean-themed — aquatic/wetland biomes get 5x weight
# Non-listed biomes default to weight 1
# Expected aquatic proportion: (11 * 5) / (11 * 5 + 34 * 1) = 55/89 ≈ 61.8%
biome_weights:
  SWAMP: 5
  MANGROVE_SWAMP: 5
  BOG: 5
  OCEAN: 5
  DEEP_OCEAN: 5
  CORAL_REEF: 5
  RIVER: 5
  LAKE: 5
  WATERFALL: 5
  ISLAND: 5
  COAST: 5

