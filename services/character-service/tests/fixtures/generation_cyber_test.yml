version: "c1"
namespace: "CYBER_FRIENDS"
id_prefix: "CF"
name_template: "{variant} {sub_type}"
title_template: "{role} of {domain}"

# =============================================================================
# RARITY SYSTEM (same structure, different flavour text)
# =============================================================================

rarity_weights:
  COMMON:    { min: 0, max: 69 }
  UNCOMMON:  { min: 70, max: 89 }
  RARE:      { min: 90, max: 96 }
  EPIC:      { min: 97, max: 98 }
  LEGENDARY: { min: 99, max: 99 }

supply_caps:
  COMMON:    null
  UNCOMMON:  100000
  RARE:      25000
  EPIC:      5000
  LEGENDARY: 500

collision_policy:
  COMMON:    ALLOW
  UNCOMMON:  ALLOW
  RARE:      ALLOW_IF_STATS_DIFFER
  EPIC:      REROLL_ON_SIGNATURE_MATCH
  LEGENDARY: REROLL_ON_ANY_ARCHETYPE_MATCH

max_reroll_attempts: 10

stat_ranges:
  COMMON:    { min: 10, max: 40 }
  UNCOMMON:  { min: 25, max: 55 }
  RARE:      { min: 40, max: 70 }
  EPIC:      { min: 55, max: 85 }
  LEGENDARY: { min: 70, max: 100 }

stat_names:
  - power
  - defense
  - agility
  - wisdom
  - ferocity
  - magic
  - luck

